<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_base.css">
  <style>
    body { padding: 22px 24px; background: #05070d; color: rgba(255,255,255,0.96); }
    .scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; flex: 1; }
    .cell { display: flex; flex-direction: column; gap: 6px; }
    .sw { height: 72px; border-radius: 14px; box-shadow: 0 8px 24px -16px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08); }
    .nm { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.92); }
    .vl { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: rgba(255,255,255,0.55); line-height: 1.4; }
  </style>
</head>
<body class="dark">
  <div class="scale">
    <div class="cell">
      <div class="sw" style="background: #05070d;"></div>
      <div class="nm">brand-ink</div>
      <div class="vl">#05070d</div>
    </div>
    <div class="cell">
      <div class="sw" style="background: #0b0f1a;"></div>
      <div class="nm">card</div>
      <div class="vl">#0b0f1a</div>
    </div>
    <div class="cell">
      <div class="sw" style="background: #10162a;"></div>
      <div class="nm">card-top</div>
      <div class="vl">#10162a</div>
    </div>
    <div class="cell">
      <div class="sw" style="background: #3b6cff; border: none; box-shadow: 0 10px 30px -10px rgba(59,108,255,0.65);"></div>
      <div class="nm">primary</div>
      <div class="vl">#3b6cff</div>
    </div>
    <div class="cell">
      <div class="sw" style="background: #7aa2ff; border: none;"></div>
      <div class="nm">primary-pale</div>
      <div class="vl">#7aa2ff</div>
    </div>
  </div>
</body>
</html>
