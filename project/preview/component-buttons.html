<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_base.css">
  <style>
    body { padding: 22px 28px; gap: 12px; flex-wrap: wrap; align-items: center; }
    .btn-cta {
      display: inline-flex; align-items: center; gap: 8px;
      height: 56px; padding: 0 28px;
      border-radius: 9999px; border: 1px solid rgba(59,108,255,0.35);
      background: var(--gradient-vivid); color: #fff;
      font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
      box-shadow: var(--shadow-cta);
    }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      height: 40px; padding: 0 16px;
      border-radius: 9999px;
      background: var(--foreground); color: var(--background);
      font-weight: 600; font-size: 13px;
      box-shadow: var(--shadow-card);
    }
    .btn-ghost {
      height: 40px; padding: 0 14px;
      border-radius: 9999px;
      background: transparent; color: var(--muted-foreground);
      font-weight: 500; font-size: 13px;
    }
    .arrow { font-weight: 700; }
  </style>
</head>
<body>
  <button class="btn-cta">Inizia Gratis <span class="arrow">→</span></button>
  <button class="btn-secondary">Accedi</button>
  <button class="btn-ghost">Hai già un account?</button>
</body>
</html>
