<!doctype html>
<html lang="en">
<head>

  <link rel="stylesheet" href="_base.css">
  <style>
    body { padding: 22px 24px; flex-wrap: wrap; gap: 18px; align-items: center; }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px 18px; flex: 1; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--foreground); }
    .cell svg { width: 24px; height: 24px; }
    .nm { font-size: 10px; color: var(--muted-foreground); }
    .head { width: 100%; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: color-mix(in oklab, var(--muted-foreground) 80%, transparent); }
  </style>
</head>
