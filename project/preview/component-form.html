<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_base.css">
  <style>
    body { padding: 22px 28px; gap: 14px; align-items: stretch; }
    .field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .lb { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground); }
    .input {
      height: 48px; padding: 0 14px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
      font-size: 15px; color: var(--foreground);
      display: flex; align-items: center;
    }
    .amount-input {
      position: relative;
      height: 56px; padding: 0 16px 0 40px;
      border-radius: 18px;
      background: #fff;
      border: 2px solid var(--border);
      font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums;
      display: flex; align-items: center;
    }
    .amount-input::before {
      content: "€"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 22px; font-weight: 600;
      background: var(--gradient-primary);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .placeholder { color: color-mix(in oklab, var(--muted-foreground) 70%, transparent); }
  </style>
</head>
<body>
  <div class="field" style="flex: 0 0 200px;">
    <div class="lb">Importo</div>
    <div class="amount-input">24,50</div>
  </div>
  <div class="field">
    <div class="lb">Nome spesa</div>
    <div class="input"><span class="placeholder">es. Caffè, Netflix, Benzina…</span></div>
  </div>
</body>
</html>
