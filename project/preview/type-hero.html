<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_base.css">
  <style>
    body { background: #05070d; padding: 28px 32px; align-items: center; }
    .text {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.04;
      background: linear-gradient(135deg, #ffffff 0%, #7aa2ff 60%, #3b6cff 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      flex: 1;
    }
    .spec { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .spec div { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: rgba(255,255,255,0.55); }
    .spec strong { color: rgba(255,255,255,0.92); font-weight: 600; }
  </style>
</head>
<body class="dark">
  <div class="text">Sai davvero dove finiscono i tuoi soldi?</div>
  <div class="spec">
    <div><strong>Inter</strong> 700</div>
    <div>clamp(2.25rem, 7.5vw, 4.25rem)</div>
    <div>tracking −0.03em</div>
    <div>line-height 1.04</div>
  </div>
</body>
</html>
