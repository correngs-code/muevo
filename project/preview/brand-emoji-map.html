<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_base.css">
  <style>
    body { padding: 20px 24px; flex-direction: column; gap: 8px; }
    .head { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: color-mix(in oklab, var(--muted-foreground) 80%, transparent); }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px 16px; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .em { font-size: 26px; line-height: 1; }
    .lb { font-size: 10px; color: var(--foreground); }
    .kw { font-family: ui-monospace, Menlo, monospace; font-size: 9px; color: var(--muted-foreground); }
  </style>
</head>
<body>
  <div class="head">guessIcon() — Italian keyword map → emoji</div>
  <div class="grid">
    <div class="cell"><div class="em">🍕</div><div class="lb">Pizza</div><div class="kw">"pizza"</div></div>
    <div class="cell"><div class="em">☕</div><div class="lb">Caffè</div><div class="kw">"caffè"</div></div>
    <div class="cell"><div class="em">⛽</div><div class="lb">Benzina</div><div class="kw">"benzina"</div></div>
    <div class="cell"><div class="em">🛒</div><div class="lb">Spesa</div><div class="kw">"spesa"</div></div>
    <div class="cell"><div class="em">🍿</div><div class="lb">Film</div><div class="kw">"film"</div></div>
    <div class="cell"><div class="em">🎧</div><div class="lb">Musica</div><div class="kw">"musica"</div></div>
    <div class="cell"><div class="em">🚆</div><div class="lb">Treno</div><div class="kw">"treno"</div></div>
    <div class="cell"><div class="em">✈️</div><div class="lb">Aereo</div><div class="kw">"aereo"</div></div>
    <div class="cell"><div class="em">🏨</div><div class="lb">Hotel</div><div class="kw">"hotel"</div></div>
    <div class="cell"><div class="em">💊</div><div class="lb">Farmacia</div><div class="kw">"farmacia"</div></div>
    <div class="cell"><div class="em">🛵</div><div class="lb">Delivery</div><div class="kw">"delivery"</div></div>
    <div class="cell"><div class="em">🏠</div><div class="lb">Affitto</div><div class="kw">"affitto"</div></div>
  </div>
</body>
</html>
