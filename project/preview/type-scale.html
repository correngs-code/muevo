<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_base.css">
  <style>
    body { padding: 24px 28px; flex-direction: column; gap: 16px; }
    .row { display: flex; align-items: baseline; gap: 18px; }
    .label { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--muted-foreground); width: 90px; }
    .h2 { font-size: 36px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.1; }
    .h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .body { font-size: 13.5px; line-height: 1.55; color: var(--foreground); }
    .meta { font-size: 12px; color: var(--muted-foreground); }
    .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: color-mix(in oklab, var(--muted-foreground) 80%, transparent); }
  </style>
</head>
<body>
  <div class="row"><div class="label">H2 · 36/700</div><div class="h2">Tutto ciò che ti serve</div></div>
  <div class="row"><div class="label">H3 · 17/600</div><div class="h3">Aggiungi in 3 secondi</div></div>
  <div class="row"><div class="label">Body · 13.5/400</div><div class="body">Aggiungi spese ed entrate in pochi tap. Capisci subito quanto ti rimane.</div></div>
  <div class="row"><div class="label">Meta · 12</div><div class="meta">Lunedì 5 Maggio · Cibo &amp; Delivery</div></div>
  <div class="row"><div class="label">Eyebrow · 11</div><div class="eyebrow">Categorie · Mese · 0.14em</div></div>
</body>
</html>
